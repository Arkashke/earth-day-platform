name: Build Vendor
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: mkdir -p bootstrap/cache storage/framework/views storage/framework/cache storage/framework/sessions storage/logs storage/app/public && chmod -R 775 bootstrap/cache storage
      - run: composer install --no-dev --ignore-platform-reqs
      - uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor