name: Build Vendor
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - run: composer config --global repos.packagist composer https://packagist.org.ru && composer install --no-dev
      - uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor